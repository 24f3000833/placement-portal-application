{% extends "base.html" %}
{% block content %}

<div class="d-flex justify-content-between mb-4">
    <h4>Create New Drive</h4>
    <a href="{{ url_for('company_dashboard') }}" class="btn btn-outline-secondary">Back</a>
</div>



<div class="card">
    <div class= "card-body">
        <form method="POST" action="{{ url_for('company_create_drive') }}">
            <div class="mb-3">
                <label class="form-label">Job Title</label>
                <input type ="text" name="job_title" class ="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Job Description</label>
                <textarea name="job_description" class="form-control" rows="3"></textarea>
            </div>
            <div class="mb-3">
                <label class ="form-label">Eligibility</label>
                <textarea name="eligibility" class ="form-control" rows="2"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Salary</label>
                <input type="text" name="salary" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Location</label>
                <input type="text" name = "location" class= "form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Deadline</label>
                <input type= "date" name="deadline" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary">Save Drive</button>
            <a href="{{ url_for('company_dashboard') }}" class= "btn btn-outline-secondary">Cancel</a>
        </form>

    </div>

    
</div>

{% endblock %}
