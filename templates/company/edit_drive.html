{% extends "base.html" %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="page-title">Edit Drive</h1>
    <a href="{{ url_for('company_dashboard') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Back
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST" action="{{ url_for('company_edit_drive', id=drive.id) }}">
            <div class="mb-3">
                <label class="form-label">Job Title</label>
                <input type="text" name="job_title" class="form-control" value="{{ drive.job_title }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Job Description</label>
                <textarea name="job_description" class="form-control" rows="3">{{ drive.job_description or "" }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Eligibility</label>
                <textarea name="eligibility" class="form-control" rows="2">{{ drive.eligibility or "" }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Salary</label>
                <input type="text" name="salary" class="form-control" value="{{ drive.salary or "" }}">
            </div>
            <div class="mb-3">
                <label class="form-label">Location</label>
                <input type="text" name="location" class="form-control" value="{{ drive.location or "" }}">
            </div>
            <div class="mb-4">
                <label class="form-label">Application Deadline</label>
                <input type="date" name="deadline" class="form-control" value="{{ drive.deadline or "" }}">
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="{{ url_for('company_dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
