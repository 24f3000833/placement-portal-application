{% extends "base.html" %}
{% block content %}

<div class="auth-wrap">
    <div class="auth-left">
        <h1>Placify</h1>
        <p>Admin portal. Manage students, companies, placement drives and applications from one place.</p>
    </div>
    <div class="auth-right">
        <div class="auth-box">
            <h2>Admin Login</h2>
            <p class="subtext">Sign in with your admin credentials</p>

            <form method="POST" action="{{ url_for('admin_login') }}">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" 
                           placeholder="Enter username" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" 
                           placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Sign in as Admin</button>
            </form>

            <hr class="my-4">

            <p class="text-center" style="font-size:13.5px; color:var(--text-light)">
                Not an admin?
                <a href="{{ url_for('login') }}" class="subtle-link">Go to login</a>
            </p>
        </div>
    </div>
</div>

{% endblock %}
