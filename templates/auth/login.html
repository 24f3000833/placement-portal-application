{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow p-4">
            <h2 class="text-center mb-4">Welcome to Placify</h2>
            <form method="POST" action="/login">
                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control" placeholder="Enter your Email" required>
                </div>
                <div class="mb-3">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                </div>
                <div class="mb-3">
                    <label>Role</label>
                    <select name="role" class="form-select" required>
                        <option value="student">Student</option>
                        <option value="company">Company</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
            <hr>
            <div class="text-center">
                <p>Register as Student? <a href="/register/student">Click Here</a></p>
                <p>Register as Company? <a href="/register/company">Click Here</a></p>
                <div class="text-center mt-2">
                    <small><a href="/admin/login">Admin?Login Here</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
