{% extends "base.html" %}
{% block content %}

<div class="auth-wrap">
    <div class="auth-left">
        <h1>Placify</h1>
        <p>Create your student account and start applying for placement drives from top companies.</p>
    </div>
    <div class="auth-right">
        <div class="auth-box">
            <h2>Student Registration</h2>
            <p class="subtext">Fill in your details to create an account</p>

            <form method="POST" action="{{ url_for('register_student') }}" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control" placeholder="Enter your full name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Phone Number</label>
                    <input type="text" name="phone" class="form-control" placeholder="Enter phone number">
                </div>
                <div class="mb-3">
                    <label class="form-label">Degree</label>
                    <select name="degree" class="form-select" required>
                        <option value="" disabled selected>Select degree</option>
                        <option value="B.Tech">B.Tech</option>
                        <option value="MBA">MBA</option>
                        <option value="MCA">MCA</option>
                        <option value="BCA">BCA</option>
                        <option value="B.Sc">B.Sc</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Branch</label>
                    <input type="text" name="branch" class="form-control" placeholder="e.g. Computer Science">
                </div>
                <div class="mb-3">
                    <label class="form-label">CGPA</label>
                    <input type="number" name="cgpa" class="form-control" placeholder="e.g. 8.5" step="0.01" min="0" max="10" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Resume <span class="text-danger">*</span></label>
                    <input type="file" name="resume" class="form-control" accept=".pdf" required>
                    <div class="form-text" style="font-size:12px; color:var(--text-light)">PDF only. Max 16MB.</div>
                </div>
                <button type="submit" class="btn btn-primary w-100">Create Account</button>
            </form>

            <hr class="my-4">

            <p class="text-center" style="font-size:13.5px; color:var(--text-light)">
                Already have an account?
                <a href="{{ url_for('login') }}" class="subtle-link">Sign in</a>
            </p>
        </div>
    </div>
</div>

{% endblock %}
