{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card-shadow p-4">
            <h2 class = "text-center mb-4">Student Registration</h2>
            <form method="POST" action="/register/student" enctype="multipart/form-data">
                <div class="mb-3">
                    <label>Full Name</label>
                    <input type="text" name="name" class="form-control" placeholder="Enter your full name" required>
                </div>
                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control" placeholder="Enter your Email" required>
                </div>
                <div class="mb-3">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Create password" required>
                </div>
                <div class="mb-3">
                    <label>Phone</label>
                    <input type="text" name="phone" class="form-control" placeholder="Enter phone (optional)">
                </div>
                <div class="mb-3">
                    <label>Degree</label>
                    <input type="text" name="degree" class="form-control" placeholder="Enter your qualification" required>
                </div>
                <div class="mb-3">
                    <label>Specialization</label>
                    <input type="text" name="branch" class="form-control" placeholder="Enter your specialization" required>
                </div>
                <div class="mb-3">
                    <label>CGPA</label>
                    <input type="number" name="cgpa" class="form-control" placeholder="Enter CGPA" step="0.01" min="0" max="10" required>
                </div>
                <div class="mb-3">
                    <label>Resume (PDF Only)</label>
                    <input type="file" name="resume" class="form-control" accept=".pdf" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Register</button>
            </form>
            <hr>
            <div class="text-center">
                <p>Already Registered?<a href="/login">Login here!</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
