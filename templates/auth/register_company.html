{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header text-center fw-bold">Company Registration</div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('register_company') }}" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class= "form-label">Company Name</label>
                        <input type =  "text" name="name" class="form-control" required>
                    </div>
                    
                    <div class ="mb-3">
                        <label class= "form-label">Email</label>
                        <input type = "email" name="email" class="form-control" required>
                    </div>


                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class= "form-label">Website</label>
                        <input type = "text" name="website" class ="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Certificate (PDF only) *</label>
                        <input type="file" name="certificate" class="form-control" accept=".pdf" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Register</button>
                </form>

                <hr>


                <p class="text-center">Already have account? <a href="{{ url_for('login') }}">Login</a></p>
                <p class="text-center text-muted">Your account will be activated after admin approval.</p>
            </div>
        </div>
    </div>
</div>

{% endblock %}
